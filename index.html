<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen Bresolin - Agenda</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- CABEÇALHO -->
        <header class="header">
            <div class="logo-container">
                <svg class="logo" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                    <!-- Logo KB Elegante com curvas suaves -->
                    
                    <!-- J cursivo em verde (esquerda) -->
                    <path d="M 60 70 Q 55 90 60 120 Q 65 140 75 150 Q 80 155 85 155 Q 90 155 92 150" 
                          stroke="#7a8b82" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    
                    <!-- Elemento decorativo superior curvo em dourado -->
                    <path d="M 85 65 Q 120 50 160 75" 
                          stroke="#b89c6d" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
                    
                    <!-- K em dourado (centro-direita) -->
                    <path d="M 130 70 L 130 160" 
                          stroke="#b89c6d" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M 170 85 L 130 115 L 170 155" 
                          stroke="#b89c6d" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    
                    <!-- B em dourado (direita) -->
                    <path d="M 185 70 L 185 160" 
                          stroke="#b89c6d" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M 185 70 L 215 70 Q 225 70 225 85 Q 220 100 185 100" 
                          stroke="#b89c6d" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M 185 100 L 220 100 Q 230 100 230 120 Q 225 160 185 160" 
                          stroke="#b89c6d" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    
                    <!-- Elemento decorativo inferior em verde -->
                    <path d="M 90 180 Q 130 200 200 170" 
                          stroke="#7a8b82" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
                    
                    <!-- Elemento decorativo lateral em dourado -->
                    <path d="M 115 95 Q 125 110 115 135" 
                          stroke="#b89c6d" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
                </svg>
            </div>
            <h1>KAREN BRESOLIN</h1>
            <p>Clínica Integrada • Agenda Compartilhada</p>
        </header>

        <!-- ABAS DE NAVEGAÇÃO -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="profissionais">👥 Profissionais</button>
            <button class="tab-btn" data-tab="agendamentos">📅 Agendamentos</button>
            <button class="tab-btn" data-tab="calendario">📆 Calendário</button>
        </nav>

        <!-- ABA 1: GERENCIAR PROFISSIONAIS -->
        <section id="profissionais" class="tab-content active">
            <div class="card">
                <h2>Adicionar Profissional</h2>
                <div class="form-group">
                    <input type="text" id="nomeProfissional" placeholder="Nome do profissional">
                    <input type="text" id="especialidade" placeholder="Especialidade (ex: Manicure, Depilação)">
                    <input type="color" id="corProfissional" value="#7a8b82" title="Cor para identificar">
                    <button onclick="adicionarProfissional()" class="btn btn-primary">➕ Adicionar Profissional</button>
                </div>
            </div>

            <div class="card">
                <h2>Profissionais Cadastrados</h2>
                <div id="listaProfissionais" class="lista">
                    <!-- Profissionais aparecerão aqui -->
                </div>
            </div>
        </section>

        <!-- ABA 2: CRIAR AGENDAMENTOS -->
        <section id="agendamentos" class="tab-content">
            <div class="card">
                <h2>Novo Agendamento</h2>
                <div class="form-group">
                    <select id="selectProfissional">
                        <option value="">Selecione o profissional</option>
                    </select>
                    
                    <input type="text" id="nomeCliente" placeholder="Nome do cliente">
                    
                    <input type="text" id="telefoneCliente" placeholder="Telefone do cliente">
                    
                    <select id="tipoServico">
                        <option value="">Selecione o serviço</option>
                        <option value="Manicure">Manicure</option>
                        <option value="Pedicure">Pedicure</option>
                        <option value="Depilação">Depilação</option>
                        <option value="Massagem">Massagem</option>
                        <option value="Limpeza de pele">Limpeza de pele</option>
                        <option value="Estética Facial">Estética Facial</option>
                        <option value="Drenagem Linfática">Drenagem Linfática</option>
                        <option value="Outro">Outro</option>
                    </select>
                    
                    <input type="date" id="dataAgendamento">
                    
                    <input type="time" id="horaAgendamento">
                    
                    <input type="number" id="duracao" placeholder="Duração (minutos)" value="60">
                    
                    <button onclick="criarAgendamento()" class="btn btn-primary">✅ Agendar</button>
                </div>
            </div>

            <div class="card">
                <h2>Todos os Agendamentos</h2>
                <div id="listaAgendamentos" class="lista">
                    <!-- Agendamentos aparecerão aqui -->
                </div>
            </div>
        </section>

        <!-- ABA 3: VISUALIZAR CALENDÁRIO -->
        <section id="calendario" class="tab-content">
            <div class="card">
                <h2>Calendário de Agenda</h2>
                
                <div class="filtro-calendario">
                    <input type="date" id="dataFiltro">
                    <select id="profissionalFiltro">
                        <option value="">Todos os profissionais</option>
                    </select>
                </div>

                <div id="calendarioView" class="calendario">
                    <!-- Calendário aparecerá aqui -->
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
